services:
  # Rails 웹 서버 (프론트엔드 + 백엔드 API)
  web:
    build: .
    container_name: factcheckr_web
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
    volumes:
      - rails_storage:/rails/storage
    depends_on:
      - db

  # FastAPI AI 서버
  ai:
    build:
      context: ./ai_server
      dockerfile: Dockerfile
    container_name: factcheckr_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      FACTCHECKR_OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      FACTCHECKR_BIGKINDS_API_KEY: "${BIGKINDS_API_KEY:-}"
      FACTCHECKR_RAILS_API_URL: "http://web:80"

  # PostgreSQL + pgvector (프로덕션 DB)
  db:
    image: pgvector/pgvector:pg16
    container_name: factcheckr_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: factcheckr
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: factcheckr_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factcheckr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rails_storage:
